<script>
    (function() {
        let attempts = 0;
        var delay = 150;
        function checkReact() {
            if (typeof React !== 'undefined' && typeof ReactDOM !== 'undefined') {
                if(window.initReactCheckout && !window.checkoutInitialized) {
                    window.initReactCheckout();
                }
                return;
            }
            attempts++;
            if (attempts < 100) setTimeout(checkReact, delay);
        }
        setTimeout(checkReact, delay);
    })();

    const DEBUG_MODE = window.location.hostname === 'localhost' || window.location.search.includes('debug_tracking');
    if (DEBUG_MODE) { window.trackingDebug = true; }

    function getExternalId() { 
        const urlParams = new URLSearchParams(window.location.search);
        let eid = urlParams.get('eid');
        if (eid) { 
            try { localStorage.setItem('user_external_id', eid); } catch(e) {}
            return eid; 
        }
        try { eid = localStorage.getItem('user_external_id'); } catch(e) {}
        if (eid) return eid;
        eid = 'user_' + Math.random().toString(36).substring(2, 11) + '_' + Date.now(); 
        try { localStorage.setItem('user_external_id', eid); } catch(e) {}
        return eid;
    }
    window.getExternalId = getExternalId;

    function getTTCLID() { 
        try { 
            const u = new URLSearchParams(window.location.search); 
            const val = u.get('ttclid');
            if(val) { 
                try { localStorage.setItem('ttclid', val); } catch(e) {}
                return val; 
            }
            return localStorage.getItem('ttclid');
        } catch (e) { return null; } 
    }
    window.getTTCLID = getTTCLID;

    const UTM_KEYS = ['utm_source', 'utm_medium', 'utm_campaign', 'utm_term', 'utm_content', 'gclid', 'fbclid', 'msclkid'];
    function getStoredUTMs() {
        let utms = {};
        try { 
            const u = new URLSearchParams(window.location.search); 
            UTM_KEYS.forEach(key => { 
                const v = u.get(key); 
                if (v) { 
                    utms[key] = v; 
                    try { localStorage.setItem(key, v); } catch(e) {} 
                } else { 
                    const saved = localStorage.getItem(key); 
                    if(saved) utms[key] = saved; 
                }
            }); 
        } catch(e){}
        return utms;
    }
    window.getStoredUTMs = getStoredUTMs;

    function cleanPhone(p) { 
        if (!p) return null; 
        return p.replace(/\D/g, '');
    }
    window.cleanPhone = cleanPhone;

    // --- Normalização + Hash SHA-256 (Advanced Matching / Zaraz -> Events API) ---
    function isSha256Hex(v) {
        return typeof v === 'string' && /^[a-f0-9]{64}$/i.test(v);
    }

    function normalizeEmail(v) {
        if (!v) return null;
        return String(v).trim().toLowerCase();
    }

    function normalizePhone(v) {
        if (!v) return null;
        return String(v).replace(/\D/g, '');
    }

    async function sha256Hex(input) {
        try {
            if (!input) return null;
            if (!window.crypto || !window.crypto.subtle) return null;
            var enc = new TextEncoder();
            var data = enc.encode(input);
            var hash = await window.crypto.subtle.digest('SHA-256', data);
            var hex = Array.from(new Uint8Array(hash)).map(function(b){ return b.toString(16).padStart(2,'0'); }).join('');
            return hex;
        } catch (e) {
            return null;
        }
    }

    async function hashIdentifiers(data) {
        var out = Object.assign({}, data);

        // Email
        if (out.email) {
            var emailNorm = normalizeEmail(out.email);
            var emailHashed = isSha256Hex(emailNorm) ? emailNorm : (await sha256Hex(emailNorm));
            if (emailHashed) {
                out.email = emailHashed;
                try { localStorage.setItem('user_hashed_email', emailHashed); } catch(e) {}
            }
        } else {
            try {
                var savedE = localStorage.getItem('user_hashed_email');
                if (savedE) out.email = savedE;
            } catch(e) {}
        }

        // Phone
        if (out.phone) {
            var phoneNorm = normalizePhone(out.phone);
            var phoneHashed = isSha256Hex(phoneNorm) ? phoneNorm : (await sha256Hex(phoneNorm));
            if (phoneHashed) {
                out.phone = phoneHashed;
                try { localStorage.setItem('user_hashed_phone', phoneHashed); } catch(e) {}
            }
        } else {
            try {
                var savedP = localStorage.getItem('user_hashed_phone');
                if (savedP) out.phone = savedP;
            } catch(e) {}
        }

        return out;
    }

    
    function generateEventId() {
        return 'evt_' + Date.now() + '_' + Math.random().toString(36).substring(2, 9);
    }
    window.generateEventId = generateEventId;

    // Leitura do cookie _ttp (TikTok Pixel cookie)
    function getTTP() {
        return (document.cookie.match(/(?:^|;\s*)_ttp=([^;]*)/) || [])[1] || undefined;
    }
    window.getTTP = getTTP;

    // Normalização da URL de origem
    function getTikTokEventSourceUrl() {
        try {
            var u = new URL(window.location.href);
            u.protocol = 'https:';
            u.host = 'lojaizzat.shop';
            return u.toString();
        } catch(_) { return 'https://lojaizzat.shop/'; }
    }
    window.getTikTokEventSourceUrl = getTikTokEventSourceUrl;

    // CAPI server-side (Cloudflare Pages Function)
    async function sendCAPI(event, eventId, properties, user) {
        try {
            await fetch('/api/tiktok-events', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ event: event, event_id: eventId, properties: properties, user: user })
            });
        } catch(e) {
            if (DEBUG_MODE) console.error('[sendCAPI]', e);
        }
    }

    function trackPixel(event, data) {
        if (window.__TEST_MODE) { console.log('[TEST_MODE] Evento bloqueado:', event, data); return; }
        data = data || {};
        requestAnimationFrame(function() {
            Promise.resolve().then(async function() {
                var finalData = Object.assign({}, data);

                // Normalização
                if (finalData.phone) finalData.phone = normalizePhone(finalData.phone);
                if (finalData.email) finalData.email = normalizeEmail(finalData.email);

                // Hash PII (email/phone) para Advanced Matching e Events API
                finalData = await hashIdentifiers(finalData);

                var eventId = finalData.event_id || generateEventId();

                var payload = Object.assign({}, finalData, window.getStoredUTMs(), {
                    external_id: window.getExternalId(),
                    ttclid: window.getTTCLID(),
                    event_source_url: getTikTokEventSourceUrl(),
                    event_time: Math.floor(Date.now() / 1000)
                });

                // Browser Pixel (com event_id para deduplicação)
                if (window.ttq && typeof window.ttq.track === 'function') {
                    try {
                        var bp = Object.assign({}, payload);
                        delete bp.event_id;
                        window.ttq.track(event, bp, { event_id: eventId });
                    } catch(e) {}
                }

                // CAPI server-side (dupla camada — mesmo event_id para deduplicação)
                sendCAPI(
                    event,
                    eventId,
                    Object.assign({}, window.PRODUCT_CONTENT || {}, { event_source_url: getTikTokEventSourceUrl() }),
                    {
                        email:       finalData.email || undefined,
                        phone_number: finalData.phone || undefined,
                        external_id: window.getExternalId(),
                        ttclid:      window.getTTCLID(),
                        ttp:         getTTP()
                    }
                );

                // GA fallback
                if (typeof gtag === 'function') {
                    try { gtag('event', event, payload); } catch(e) {}
                }
            }).catch(function(error) {
                if (DEBUG_MODE) console.error('[trackPixel]', error);
            });
        });
    }
    window.trackPixel = trackPixel;

    let INITIAL_HEIGHT = window.visualViewport ? window.visualViewport.height : window.innerHeight;
    
    function setupKeyboardDetection() {
        const isVisualViewportSupported = typeof window.visualViewport !== 'undefined';
        
        if (isVisualViewportSupported) {
            const visualViewport = window.visualViewport;
            const handleResize = () => {
                const currentHeight = visualViewport.height;
                if (currentHeight > INITIAL_HEIGHT) INITIAL_HEIGHT = currentHeight;
                const diff = INITIAL_HEIGHT - currentHeight;
                
                if (diff > 150) { 
                    document.documentElement.style.setProperty('--keyboard-height', diff + 'px');
                    document.body.classList.add('keyboard-open');
                } else {
                    document.body.classList.remove('keyboard-open');
                    document.documentElement.style.setProperty('--keyboard-height', '0px');

            visualViewport.addEventListener('resize', handleResize);
        }

        window.addEventListener('resize', () => {
            if (isVisualViewportSupported) return; 
            const currentHeight = window.innerHeight;
            const diff = INITIAL_HEIGHT - currentHeight;
            if (diff > 150) {
                document.body.classList.add('keyboard-open');
            } else {
                document.body.classList.remove('keyboard-open');
            }
        });

        document.addEventListener('focusin', (e) => {
            if (['INPUT', 'TEXTAREA'].includes(e.target.tagName)) {
                document.body.classList.add('keyboard-open');
            }
        });
        
        document.addEventListener('focusout', (e) => {
            if (['INPUT', 'TEXTAREA'].includes(e.target.tagName)) {
               setTimeout(() => {
                   if (document.activeElement && !['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName)) {
                       document.body.classList.remove('keyboard-open');
                   }
               }, 150);
            }
        });

        window.addEventListener('orientationchange', () => {
            setTimeout(() => { INITIAL_HEIGHT = window.visualViewport ? window.visualViewport.height : window.innerHeight; }, 200);
        });
    }
    
    function safeCopyToClipboard(text) {
        return new Promise((resolve, reject) => {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(resolve).catch(() => fallbackCopy(text) ? resolve() : reject());
            } else {
                fallbackCopy(text) ? resolve() : reject();
            }
        });
    }
    
    function fallbackCopy(text) {
        try {
            const textArea = document.createElement('textarea');
            textArea.value = text;
            textArea.style.position = 'fixed';
            textArea.style.left = '-999999px';
            textArea.style.top = '-999999px';
            textArea.style.opacity = '0';
            textArea.setAttribute('readonly', '');
            document.body.appendChild(textArea);
            
            if (navigator.userAgent.match(/ipad|iphone/i)) {
                const range = document.createRange();
                range.selectNodeContents(textArea);
                const selection = window.getSelection();
                selection.removeAllRanges();
                selection.addRange(range);
                textArea.setSelectionRange(0, 999999);
            } else {
                textArea.select();
            }
            
            const successful = document.execCommand('copy');
            document.body.removeChild(textArea);
            return successful;
        } catch (err) {
            return false;
        }
    }
    
    window.safeCopyToClipboard = safeCopyToClipboard;

    function createInputMask(type) {
        return {
            format: function(value, selectionStart) {
                if (!value) return { formatted: "", cursorPosition: 0 };
                let rawNumbers = value.replace(/\D/g, '');

                // Phone: detecta 55 no início como código do país
                var hasCountryCode = false;
                if (type === 'phone') {
                    if (rawNumbers.length > 11 && rawNumbers.substring(0, 2) === '55') {
                        hasCountryCode = true;
                        rawNumbers = rawNumbers.substring(2); // remove 55 para formatar o resto
                    }
                    if (rawNumbers.length > 11) rawNumbers = rawNumbers.substring(0, 11);
                }
                if (type === 'cpf' && rawNumbers.length > 11) rawNumbers = rawNumbers.substring(0, 11);
                if (type === 'cep' && rawNumbers.length > 8) rawNumbers = rawNumbers.substring(0, 8);

                let formatted = "";
                switch(type) {
                    case 'phone':
                        if (rawNumbers.length <= 2) formatted = rawNumbers.replace(/^(\d{0,2})/, '($1');
                        else if (rawNumbers.length <= 7) formatted = rawNumbers.replace(/^(\d{2})(\d{0,5})/, '($1) $2');
                        else formatted = rawNumbers.replace(/^(\d{2})(\d{5})(\d{0,4})/, '($1) $2-$3');
                        if (hasCountryCode) formatted = '+55 ' + formatted;
                        break;
                    case 'cpf':
                        formatted = rawNumbers.replace(/^(\d{0,3})(\d{0,3})(\d{0,3})(\d{0,2})/, (match, g1, g2, g3, g4) => {
                            let result = '';
                            if (g1) result += g1; if (g2) result += `.${g2}`; if (g3) result += `.${g3}`; if (g4) result += `-${g4}`;
                            return result;
                        });
                        break;
                    case 'cep':
                        formatted = rawNumbers.replace(/^(\d{0,5})(\d{0,3})/, (match, g1, g2) => {
                            let result = '';
                            if (g1) result += g1; if (g2) result += `-${g2}`;
                            return result;
                        });
                        break;
                }
                
                let digitsBeforeCursor = 0;
                if (selectionStart !== undefined && selectionStart !== null) {
                    for (let i = 0; i < Math.min(selectionStart, value.length); i++) {
                        if (value[i] >= '0' && value[i] <= '9') digitsBeforeCursor++;
                    }
                }
                
                let newPos = 0;
                let digitCount = 0;
                for (let i = 0; i < formatted.length; i++) {
                    if (formatted[i] >= '0' && formatted[i] <= '9') digitCount++;
                    if (digitCount >= digitsBeforeCursor) { newPos = i + 1; break; }
                }
                if (digitsBeforeCursor === 0) newPos = 0;
                if (formatted.length < value.length && selectionStart === value.length) newPos = formatted.length;
                
                return { formatted, cursorPosition: newPos };
            }
        };
    }
    
    window.createInputMask = createInputMask;
    </script>
