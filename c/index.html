            if (!window.crypto || !window.crypto.subtle) return null;

            var hex = Array.from(new Uint8Array(hash)).map(function(b){ return b.toString(16).padStart(2,'0'); }).join('');
            return hex;
        } catch (e) {
            return null;
        }
    }

    function setupKeyboardDetection() {
        if (keyboardDetectionStarted) return;

        INITIAL_HEIGHT = window.visualViewport ? window.visualViewport.height : window.innerHeight;
        const isVisualViewportSupported = typeof window.visualViewport !== 'undefined';
        let activeCheckoutField = null;

        const isCheckoutTextField = (target) => {
            if (!target || !target.tagName) return false;
            const tag = String(target.tagName).toUpperCase();
            if (tag !== 'INPUT' && tag !== 'TEXTAREA' && tag !== 'SELECT') return false;
            if (target.type && String(target.type).toLowerCase() === 'hidden') return false;
            return !!(target.closest && target.closest('#checkout-root, #spa-checkout-wrapper'));
        };

        const clearFocusScrollTimers = () => {
            while (focusScrollTimers.length) clearTimeout(focusScrollTimers.pop());
        };

        const getCheckoutHeaderOffset = () => {
            return 24;
        };

        const getCheckoutScrollContainer = (field) => {
            const wrapper = field && field.closest ? field.closest('#spa-checkout-wrapper') : null;
            if (wrapper && window.getComputedStyle(wrapper).display !== 'none') return wrapper;
            return document.scrollingElement || document.documentElement || document.body;
        };

        const scrollCheckoutBy = (container, delta) => {
            if (!container || container === document.documentElement || container === document.body || container === document.scrollingElement) {
                window.scrollBy({ top: delta, left: 0, behavior: 'auto' });
            } else {
                container.scrollTop += delta;
            }
        };

        const getNextCheckoutField = (field) => {
            let fields = Array.from(document.querySelectorAll('#checkout-root input, #checkout-root textarea, #checkout-root select, #spa-checkout-wrapper input, #spa-checkout-wrapper textarea, #spa-checkout-wrapper select'));
            fields = fields.filter((item) => {
                if (!isCheckoutTextField(item) || item.disabled) return false;
                const rect = item.getBoundingClientRect();
                return rect.width > 0 && rect.height > 0;
            });
            const index = fields.indexOf(field);
            return index >= 0 && index + 1 < fields.length ? fields[index + 1] : null;
        };

        const getEffectiveViewportBottom = (viewportHeight, containerBottom) => {
            const layoutHeight = window.innerHeight || document.documentElement.clientHeight || viewportHeight;
            const resizedForKeyboard = (INITIAL_HEIGHT - viewportHeight > 120) || (INITIAL_HEIGHT - layoutHeight > 120);
            const keyboardLikelyOverlaying = !!activeCheckoutField && !resizedForKeyboard;
            const estimatedKeyboardInset = keyboardLikelyOverlaying ? Math.max(260, Math.min(380, layoutHeight * 0.42)) : 0;
            return Math.min(viewportHeight, containerBottom, layoutHeight - estimatedKeyboardInset);
        };

        const ensureCheckoutFieldVisible = (field) => {
            if (!field || !document.contains(field) || !isCheckoutTextField(field)) return;

                const viewportHeight = visualViewport ? visualViewport.height : window.innerHeight;

                    : { top: 0, bottom: viewportHeight };
                const rect = field.getBoundingClientRect();
                const nextField = getNextCheckoutField(field);
                const nextRect = nextField ? nextField.getBoundingClientRect() : null;
                const topGuard = Math.max(containerRect.top + 20, getCheckoutHeaderOffset());
                const keyboardComfortInset = Math.max(72, Math.min(120, viewportHeight * 0.22));
                const visibleBottom = Math.max(topGuard + 150, getEffectiveViewportBottom(viewportHeight, containerRect.bottom) - keyboardComfortInset);
                const nextReserve = nextRect ? Math.min(240, Math.max(150, nextRect.bottom - rect.top + 18)) : 150;

                if (rect.bottom > visibleBottom) delta = Math.max(delta, rect.bottom - visibleBottom + 12);
                if (rect.top > desiredTop + 18) delta = Math.max(delta, rect.top - desiredTop);
                else if (rect.top < topGuard) delta = rect.top - topGuard;
                if (Math.abs(delta) > 18) scrollCheckoutBy(scrollContainer, delta);

        };

        const scheduleCheckoutFieldScroll = (field) => {
            if (!isCheckoutTextField(field)) return;
            activeCheckoutField = field;
            document.body.classList.add('keyboard-open');
            clearFocusScrollTimers();
            [120, 380, 760, 1120].forEach((delay) => {
                focusScrollTimers.push(setTimeout(() => {
                    if (activeCheckoutField === field) {
                        ensureCheckoutFieldVisible(field);
                        try {
                            if (field.scrollIntoView) field.scrollIntoView({ block: 'center', inline: 'nearest', behavior: 'auto' });
                        } catch (e) {}
                    }
                }, delay));
            });
        };
        
        if (isVisualViewportSupported) {
            const visualViewport = window.visualViewport;
            const handleResize = () => {

    function safeCopyToClipboard(text) {
        return new Promise((resolve, reject) => {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(resolve).catch(() => fallbackCopy(text) ? resolve() : reject());

            }
        });
    }
    
    function fallbackCopy(text) {
        try {
            const textArea = document.createElement('textarea');
            textArea.value = text;
            textArea.style.position = 'fixed';
            textArea.style.left = '-999999px';
            textArea.style.top = '-999999px';
            textArea.style.opacity = '0';
            textArea.setAttribute('readonly', '');
            document.body.appendChild(textArea);
            
            if (navigator.userAgent.match(/ipad|iphone/i)) {
                const range = document.createRange();
                range.selectNodeContents(textArea);
                const selection = window.getSelection();
                selection.removeAllRanges();
                selection.addRange(range);
                textArea.setSelectionRange(0, 999999);
            } else {
                textArea.select();
            }
            
            const successful = document.execCommand('copy');
            document.body.removeChild(textArea);
            return successful;
        } catch (err) {
            return false;
        }
    }

    function createInputMask(type) {
        return {
            format: function(value, selectionStart) {
                if (!value) return { formatted: "", cursorPosition: 0 };
                let rawNumbers = value.replace(/\D/g, '');

                // Phone: detecta 55 no início como código do país
                var hasCountryCode = false;
                if (type === 'phone') {
                    if (rawNumbers.length > 11 && rawNumbers.substring(0, 2) === '55') {
                        hasCountryCode = true;
                        rawNumbers = rawNumbers.substring(2); // remove 55 para formatar o resto
                    }
                    if (rawNumbers.length > 11) rawNumbers = rawNumbers.substring(0, 11);
                }
                if (type === 'cpf' && rawNumbers.length > 11) rawNumbers = rawNumbers.substring(0, 11);
                if (type === 'cep' && rawNumbers.length > 8) rawNumbers = rawNumbers.substring(0, 8);

                let formatted = "";
                switch(type) {
                    case 'phone':
                        if (rawNumbers.length <= 2) formatted = rawNumbers.replace(/^(\d{0,2})/, '($1');
                        else if (rawNumbers.length <= 7) formatted = rawNumbers.replace(/^(\d{2})(\d{0,5})/, '($1) $2');
                        else formatted = rawNumbers.replace(/^(\d{2})(\d{5})(\d{0,4})/, '($1) $2-$3');
                        if (hasCountryCode) formatted = '+55 ' + formatted;
                        break;
                    case 'cpf':
                        formatted = rawNumbers.replace(/^(\d{0,3})(\d{0,3})(\d{0,3})(\d{0,2})/, (match, g1, g2, g3, g4) => {
                            let result = '';
                            if (g1) result += g1; if (g2) result += `.${g2}`; if (g3) result += `.${g3}`; if (g4) result += `-${g4}`;
                            return result;
                        });
                        break;
                    case 'cep':
                        formatted = rawNumbers.replace(/^(\d{0,5})(\d{0,3})/, (match, g1, g2) => {
                            let result = '';
                            if (g1) result += g1; if (g2) result += `-${g2}`;
                            return result;
                        });
                        break;
                }
                
                let digitsBeforeCursor = 0;
                if (selectionStart !== undefined && selectionStart !== null) {
                    for (let i = 0; i < Math.min(selectionStart, value.length); i++) {
                        if (value[i] >= '0' && value[i] <= '9') digitsBeforeCursor++;
                    }
                }
                
                let newPos = 0;
                let digitCount = 0;
                for (let i = 0; i < formatted.length; i++) {
                    if (formatted[i] >= '0' && formatted[i] <= '9') digitCount++;
                    if (digitCount >= digitsBeforeCursor) { newPos = i + 1; break; }
                }
                if (digitsBeforeCursor === 0) newPos = 0;
                if (formatted.length < value.length && selectionStart === value.length) newPos = formatted.length;
                
                return { formatted, cursorPosition: newPos };
            }
        };
    }
