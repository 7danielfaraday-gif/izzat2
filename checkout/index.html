    <!-- Tracking Infrastructure (copiado intacto do projeto original) -->
    <script>
    const DEBUG_MODE = window.location.hostname === 'localhost' || window.location.search.includes('debug_tracking');
    if (DEBUG_MODE) { window.trackingDebug = true; }

    function getExternalId() {
        // Persistência: external_id em localStorage (mantém atribuição entre sessões)
        try {
            let eid = localStorage.getItem('user_external_id');
            if (!eid) {
                eid = 'sess_' + Math.random().toString(36).substring(2, 11) + '_' + Date.now();
                localStorage.setItem('user_external_id', eid);
            }
            return eid;
        } catch(e) {
            return 'sess_' + Math.random().toString(36).substring(2, 11) + '_' + Date.now();
        }
    }
    window.getExternalId = getExternalId;

    function getTTCLID() { 
        try { 
            const u = new URLSearchParams(window.location.search); 
            const val = u.get('ttclid');
            if(val) { 
                try { localStorage.setItem('ttclid', val); } catch(e) {}
                return val; 
            }
            return localStorage.getItem('ttclid');
        } catch (e) { return null; } 
    }
    window.getTTCLID = getTTCLID;

    // REF (estilo Monetizze): últimos 8 caracteres do ttclid (quando existir)
    function getRefCode() {
        try {
            var t = getTTCLID();
            if (!t) return '';
            t = String(t);
            return t.length > 8 ? t.slice(-8) : t;
        } catch(e) { return ''; }
    }
    window.getRefCode = getRefCode;

    const UTM_KEYS = ['utm_source', 'utm_medium', 'utm_campaign', 'utm_term', 'utm_content', 'gclid', 'fbclid', 'msclkid'];
    function getStoredUTMs() {
        let utms = {};
        try { 
            const u = new URLSearchParams(window.location.search); 
            UTM_KEYS.forEach(key => { 
                const v = u.get(key); 
                if (v) { 
                    utms[key] = v; 
                    try { localStorage.setItem(key, v); } catch(e) {} 
                } else { 
                    const saved = localStorage.getItem(key); 
                    if(saved) utms[key] = saved; 
                }
            }); 
        } catch(e){}
        return utms;
    }
    window.getStoredUTMs = getStoredUTMs;

    function cleanPhone(p) { 
        if (!p) return null; 
        return p.replace(/\D/g, '');
    }
    window.cleanPhone = cleanPhone;
    // (Compliance) Removido hashing/armazenamento de identificadores no front-end.

    function getSessionEventId() {
        // Sessão do checkout: um único event_id para todos os disparos desta transação
        try {
            var key = 'checkout_event_id';
            var eid = sessionStorage.getItem(key);
            if (!eid) {
                eid = 'evt_' + Date.now() + '_' + Math.random().toString(36).substring(2, 9);
                sessionStorage.setItem(key, eid);
            }
            return eid;
        } catch(e) {
            window.__checkout_event_id = window.__checkout_event_id || ('evt_' + Date.now() + '_' + Math.random().toString(36).substring(2, 9));
            return window.__checkout_event_id;
        }
    }
    window.getSessionEventId = getSessionEventId;

    // ✅ FIX: generateEventId gera ID único por evento (não por sessão)
    // getSessionEventId() mantido para CompletePayment (browser+server precisam do mesmo ID)
    function generateEventId() {
        return 'evt_' + Date.now() + '_' + Math.random().toString(36).substring(2, 9);
    }
    window.generateEventId = generateEventId;

    // Gera imediatamente no início da transação
    try { window.__checkout_event_id = getSessionEventId(); } catch(e) {}
    function trackPixel(event, data = {}, useBeacon = false) {
        requestAnimationFrame(() => {
            Promise.resolve().then(() => {
                var finalData = Object.assign({}, data || {});

                // ✅ Anti-vazamento: nunca envie PII/sensíveis para TikTok
                // (checkout pode ter email/telefone/CPF/endereço, mas isso NÃO vai no tracking)
                var DROP = ['email','phone','phone_number','external_id','cpf','address','cep','number','city','state','name','firstName','lastName','nome','telefone','tel','mail'];
                var HASH_ONLY = ['email','phone','phone_number','external_id','fn','ln','ct','st','zp'];
                var IS_SHA256 = function(v){ try { return typeof v === 'string' && /^[a-f0-9]{64}$/i.test(v.trim()); } catch(e){ return false; } };

                // ✅ Anti-vazamento: remove PII bruta e só deixa passar hashes (SHA-256) nos campos de matching
                for (var i = 0; i < DROP.length; i++) {
                    try {
                        var k = DROP[i];
                        if (!finalData || !Object.prototype.hasOwnProperty.call(finalData, k)) continue;

                        // ✅ Permite SOMENTE hash SHA-256 em email/phone (anti-ban + privacidade)
                        if ((k === 'email' || k === 'phone' || k === 'phone_number' || k === 'external_id') && IS_SHA256(finalData[k])) continue;

                        delete finalData[k];
                    } catch(e) {}
                }

                // ✅ Campos de matching: passam apenas se forem hashes válidos (64 chars hex)
                for (var j = 0; j < HASH_ONLY.length; j++) {
                    try {
                        var hk = HASH_ONLY[j];
                        if (!finalData || !Object.prototype.hasOwnProperty.call(finalData, hk)) continue;
                        if (!IS_SHA256(finalData[hk])) delete finalData[hk];
                    } catch(e) {}
                }

                // ✅ FIX: respeita event_id único passado por cada chamada (não sobrescreve)
                // CompletePayment usa getSessionEventId() para sincronizar browser+server
                // Todos os outros eventos usam generateEventId() único por disparo
                if (!finalData.event_id) {
                    finalData.event_id = generateEventId();
                }


                var payload = Object.assign({}, finalData, {
                    ttclid: window.getTTCLID(),
                    ...window.getStoredUTMs(),
                    event_source_url: window.location.origin + window.location.pathname,
                    event_time: Math.floor(Date.now() / 1000)
                });
                // Browser Pixel do projeto
                if (window.ttq && typeof window.ttq.track === 'function') {
                    try { window.ttq.track(event, payload); } catch(e) {}
                }

                // GA fallback (opcional) — payload já está sanitizado
                if (typeof gtag === 'function') {
                    try { gtag('event', event, payload); } catch(e) {}
                }
            }).catch((error) => {
                if (DEBUG_MODE) console.error('trackPixel error:', error);
            });
        });
    }
    window.trackPixel = trackPixel;

    function isTikTokWebView() {
        // TikTok in-app browser adiciona "https://" no início ao usar navigator.clipboard.writeText
        // Detectamos pelo userAgent para usar o método alternativo (textarea)
        return /musical_ly|tiktok|bytedancewebview|musical\.ly/i.test(navigator.userAgent);
    }

    function safeCopyToClipboard(text) {
        return new Promise((resolve, reject) => {
            // ⚠️ BUG TIKTOK WEBVIEW: o clipboard nativo prefixa "https://" no texto.
            // Forçamos o fallback via textarea para garantir cópia limpa.
            if (isTikTokWebView()) {
                fallbackCopy(text) ? resolve() : reject();
                return;
            }
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(resolve).catch(() => fallbackCopy(text) ? resolve() : reject());
            } else {
                fallbackCopy(text) ? resolve() : reject();
            }
        });
    }
    
    function fallbackCopy(text) {
        try {
            const textArea = document.createElement('textarea');
            textArea.value = text;
            textArea.style.position = 'fixed';
            textArea.style.left = '-999999px';
            textArea.style.top = '-999999px';
            textArea.style.opacity = '0';
            textArea.setAttribute('readonly', '');
            document.body.appendChild(textArea);
            
            if (navigator.userAgent.match(/ipad|iphone/i)) {
                const range = document.createRange();
                range.selectNodeContents(textArea);
                const selection = window.getSelection();
                selection.removeAllRanges();
                selection.addRange(range);
                textArea.setSelectionRange(0, 999999);
            } else {
                textArea.select();
            }
            
            const successful = document.execCommand('copy');
            document.body.removeChild(textArea);
            return successful;
        } catch (err) {
            return false;
        }
    }
    
    window.safeCopyToClipboard = safeCopyToClipboard;

    function createInputMask(type) {
        return {
            format: function(value, selectionStart) {
                if (!value) return { formatted: "", cursorPosition: 0 };
                let rawNumbers = value.replace(/\D/g, '');
                
                if (type === 'phone') { if (rawNumbers.length > 13) rawNumbers = rawNumbers.substring(0, 13); }
                if (type === 'cpf' && rawNumbers.length > 11) rawNumbers = rawNumbers.substring(0, 11);
                if (type === 'cep' && rawNumbers.length > 8) rawNumbers = rawNumbers.substring(0, 8);

                let formatted = "";
                switch(type) {
                    case 'phone':
                        (function() {
                            var prefix = '';
                            var digits = rawNumbers;
                            if (rawNumbers.startsWith('55') && rawNumbers.length > 2) {
                                prefix = '+55 ';
                                digits = rawNumbers.substring(2);
                            }
                            var ddd = digits.substring(0, 2);
                            var part1 = digits.substring(2, 7);
                            var part2 = digits.substring(7, 11);
                            if (digits.length === 0) formatted = prefix;
                            else if (digits.length <= 2) formatted = prefix + '(' + ddd;
                            else if (digits.length <= 7) formatted = prefix + '(' + ddd + ') ' + part1;
                            else formatted = prefix + '(' + ddd + ') ' + part1 + '-' + part2;
                        })();
                        break;
                    case 'cpf':
                        formatted = rawNumbers.replace(/^(\d{0,3})(\d{0,3})(\d{0,3})(\d{0,2})/, (match, g1, g2, g3, g4) => {
                            let result = '';
                            if (g1) result += g1; if (g2) result += `.${g2}`; if (g3) result += `.${g3}`; if (g4) result += `-${g4}`;
                            return result;
                        });
                        break;
                    case 'cep':
                        formatted = rawNumbers.replace(/^(\d{0,5})(\d{0,3})/, (match, g1, g2) => {
                            let result = '';
                            if (g1) result += g1; if (g2) result += `-${g2}`;
                            return result;
                        });
                        break;
                }
                
                let digitsBeforeCursor = 0;
                if (selectionStart !== undefined && selectionStart !== null) {
                    for (let i = 0; i < Math.min(selectionStart, value.length); i++) {
                        if (value[i] >= '0' && value[i] <= '9') digitsBeforeCursor++;
                    }
                }
                
                let newPos = 0;
                let digitCount = 0;
                for (let i = 0; i < formatted.length; i++) {
                    if (formatted[i] >= '0' && formatted[i] <= '9') digitCount++;
                    if (digitCount >= digitsBeforeCursor) { newPos = i + 1; break; }
                }
                if (digitsBeforeCursor === 0) newPos = 0;
                if (formatted.length < value.length && selectionStart === value.length) newPos = formatted.length;
                
                return { formatted, cursorPosition: newPos };
            }
        };
    }
    
    window.createInputMask = createInputMask;
    </script>

            if(src.includes('unpkg')) s.crossOrigin = "anonymous";
