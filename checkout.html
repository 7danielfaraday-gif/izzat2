<script>
    // Watchdog Scoped
    (function() {
        let attempts = 0;
        var delay = 120;
        function checkReact() {
            if (typeof React !== 'undefined' && typeof ReactDOM !== 'undefined') {
                if(window.initReactCheckout && !window.checkoutInitialized) {
                    window.initReactCheckout();
                }
                return;
            }

            attempts++;
            delay = Math.min(600, Math.floor(delay * 1.15));
            if (attempts === 15) { 
                console.warn("Carregamento local demorou. Tentando CDN de emergência...");
                var r = document.createElement('script'); 
                r.src = "https://unpkg.com/react@18/umd/react.production.min.js";
                r.onload = function() {
                    var d = document.createElement('script'); 
                    d.src = "https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"; 
                    d.onload = function(){ 
                        // Tailwind agora é CSS estático - não precisa de CDN fallback
                        if(window.initReactCheckout) window.initReactCheckout(); 
                    };
                    document.head.appendChild(d);
                };
                document.head.appendChild(r);
            }
            
            if (attempts > 100) { 
                console.error("Falha crítica no carregamento (Local e CDN).");
                try { 
                    if (loader) {
                        loader.innerHTML = '' +
                            '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:24px;text-align:center;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif;">' +
                            '<div style="font-weight:800;font-size:18px;color:#0f172a;margin-bottom:8px;">Não foi possível carregar o checkout</div>' +
                            '<div style="font-size:13px;color:#475569;max-width:420px;line-height:1.4;">Isso pode acontecer em alguns navegadores embutidos (TikTok/Instagram) quando a conexão está instável. Toque abaixo para tentar novamente.</div>' +
                            '<button style="margin-top:16px;background:#16a34a;color:#fff;border:none;border-radius:12px;padding:14px 18px;font-weight:800;font-size:14px;min-height:44px;width:100%;max-width:320px;cursor:pointer;" onclick="location.reload()">Recarregar</button>' +
                            '<button style="margin-top:10px;background:transparent;color:#64748b;border:1px solid #e2e8f0;border-radius:12px;padding:12px 18px;font-weight:700;font-size:13px;min-height:44px;width:100%;max-width:320px;cursor:pointer;" onclick="location.href='/'">Voltar para o site</button>' +
                            '</div>';
                    }
                } catch(e) {}
                return;
            }
            
            setTimeout(checkReact, delay);
        }
        setTimeout(checkReact, delay);
    })();

    const DEBUG_MODE = window.location.hostname === 'localhost' || window.location.search.includes('debug_tracking');
    if (DEBUG_MODE) { window.trackingDebug = true; }

    function getExternalId() { 
        const urlParams = new URLSearchParams(window.location.search);
        let eid = urlParams.get('eid');
        if (eid) { 
            try { localStorage.setItem('user_external_id', eid); } catch(e) {}
            return eid; 
        }
        try { eid = localStorage.getItem('user_external_id'); } catch(e) {}
        if (eid) return eid;
        eid = 'user_' + Math.random().toString(36).substring(2, 11) + '_' + Date.now(); 
        try { localStorage.setItem('user_external_id', eid); } catch(e) {}
        return eid;
    }
    window.getExternalId = getExternalId;

    function getTTCLID() { 
        try { 
            const u = new URLSearchParams(window.location.search); 
            const val = u.get('ttclid');
            if(val) { 
                try { localStorage.setItem('ttclid', val); } catch(e) {}
                return val; 
            }
            return localStorage.getItem('ttclid');
        } catch (e) { return null; } 
    }
    window.getTTCLID = getTTCLID;

    const UTM_KEYS = ['utm_source', 'utm_medium', 'utm_campaign', 'utm_term', 'utm_content', 'gclid', 'fbclid', 'msclkid'];
    function getStoredUTMs() {
        let utms = {};
        try { 
            const u = new URLSearchParams(window.location.search); 
            UTM_KEYS.forEach(key => { 
                const v = u.get(key); 
                if (v) { 
                    utms[key] = v; 
                    try { localStorage.setItem(key, v); } catch(e) {} 
                } else { 
                    const saved = localStorage.getItem(key); 
                    if(saved) utms[key] = saved; 
                }
            }); 
        } catch(e){}
        return utms;
    }
    window.getStoredUTMs = getStoredUTMs;

    function cleanPhone(p) { 
        if (!p) return null; 
        return p.replace(/\D/g, '');
    }
    window.cleanPhone = cleanPhone;

    // --- Normalização + Hash SHA-256 (Advanced Matching / Zaraz -> Events API) ---
    function isSha256Hex(v) {
        return typeof v === 'string' && /^[a-f0-9]{64}$/i.test(v);
    }

    function normalizeEmail(v) {
        if (!v) return null;
        return String(v).trim().toLowerCase();
    }

    function normalizePhone(v) {
        if (!v) return null;
        return String(v).replace(/\D/g, '');
    }

    async function sha256Hex(input) {
        try {
            if (!input) return null;
            if (!window.crypto || !window.crypto.subtle) return null;
            var enc = new TextEncoder();
            var data = enc.encode(input);
            var hash = await window.crypto.subtle.digest('SHA-256', data);
            var hex = Array.from(new Uint8Array(hash)).map(function(b){ return b.toString(16).padStart(2,'0'); }).join('');
            return hex;
        } catch (e) {
            return null;
        }
    }

    async function hashIdentifiers(data) {
        var out = Object.assign({}, data);

        // Email
        if (out.email) {
            var emailNorm = normalizeEmail(out.email);
            var emailHashed = isSha256Hex(emailNorm) ? emailNorm : (await sha256Hex(emailNorm));
            if (emailHashed) {
                out.email = emailHashed;
                try { localStorage.setItem('user_hashed_email', emailHashed); } catch(e) {}
            }
        } else {
            try {
                var savedE = localStorage.getItem('user_hashed_email');
                if (savedE) out.email = savedE;
            } catch(e) {}
        }

        // Phone
        if (out.phone) {
            var phoneNorm = normalizePhone(out.phone);
            var phoneHashed = isSha256Hex(phoneNorm) ? phoneNorm : (await sha256Hex(phoneNorm));
            if (phoneHashed) {
                out.phone = phoneHashed;
                try { localStorage.setItem('user_hashed_phone', phoneHashed); } catch(e) {}

    function setupKeyboardDetection() {

            const visualViewport = window.visualViewport;
            const handleResize = () => {
                const currentHeight = visualViewport.height;
                if (currentHeight > INITIAL_HEIGHT) INITIAL_HEIGHT = currentHeight;
                const diff = INITIAL_HEIGHT - currentHeight;
                
                if (diff > 150) { 
                    document.documentElement.style.setProperty('--keyboard-height', diff + 'px');
                    document.body.classList.add('keyboard-open');
                } else {
                    document.body.classList.remove('keyboard-open');
                    document.documentElement.style.setProperty('--keyboard-height', '0px');
                }
            };
            visualViewport.addEventListener('resize', handleResize);
        }

        window.addEventListener('resize', () => {
            if (isVisualViewportSupported) return; 
            const currentHeight = window.innerHeight;
            const diff = INITIAL_HEIGHT - currentHeight;
            if (diff > 150) {
                document.body.classList.add('keyboard-open');
            } else {
                document.body.classList.remove('keyboard-open');
            }
        });

        document.addEventListener('focusin', (e) => {
            if (['INPUT', 'TEXTAREA'].includes(e.target.tagName)) {
                document.body.classList.add('keyboard-open');
            }
        });

            if (['INPUT', 'TEXTAREA'].includes(e.target.tagName)) {

            }
        });

            setTimeout(() => { INITIAL_HEIGHT = window.visualViewport ? window.visualViewport.height : window.innerHeight; }, 200);
        });
