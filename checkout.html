<!--
  ╔══════════════════════════════════════════════════════════════╗
  ║   PEPPER — #skeleton-loader Refatorado                       ║
  ║   Shimmer otimizado para Android WebView / TikTok Browser    ║
  ║   Cole este bloco completo dentro do <head> ou no topo do    ║
  ║   <body>, antes de qualquer outro conteúdo.                  ║
  ╚══════════════════════════════════════════════════════════════╝
-->

<style>
  /* ─── Reset pontual para o skeleton ─────────────────────────── */
  #skeleton-loader *,
  #skeleton-loader *::before,
  #skeleton-loader *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  /* ─── Variáveis Pepper ───────────────────────────────────────── */
  :root {
    --sk-bg:            #f8fafc;
    --sk-card:          #ffffff;
    --sk-border:        #e2e8f0;
    --sk-green:         #16a34a;
    --sk-green-light:   #22c55e;
    --sk-base:          #e8edf3;   /* cor base dos blocos */
    --sk-shine:         #f4f7fb;   /* cor do brilho (shimmer) */
    --sk-radius-sm:     8px;
    --sk-radius-md:     12px;
    --sk-radius-lg:     16px;
    --sk-anim-dur:      1.5s;
  }

  /* ─── Shimmer: single keyframe usando background-position ────
     Usa GPU compositing sem forçar layout/paint.
     Compatível com Android 5+ WebView.                        ── */
  @keyframes sk-shimmer {
    0%   { background-position: 200% center; }
    100% { background-position: -200% center; }
  }

  /* ─── Classe base reutilizável ───────────────────────────────── */
  .sk-bone {
    background: linear-gradient(
      90deg,
      var(--sk-base)  25%,
      var(--sk-shine) 50%,
      var(--sk-base)  75%
    );
    background-size: 400% 100%;
    animation: sk-shimmer var(--sk-anim-dur) ease-in-out infinite;
    /* Hardware acceleration explícita */
    will-change: background-position;
    transform: translateZ(0);
    -webkit-transform: translateZ(0);
    border-radius: var(--sk-radius-sm);
  }

  /* ─── Wrapper principal ──────────────────────────────────────── */
  #skeleton-loader {
    position: fixed;
    inset: 0;
    width: 100%;
    min-height: 100dvh;
    background: var(--sk-bg);
    z-index: 9999;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    transition: opacity 0.35s ease-out;
  }

  /* ─── Barra de progresso (topo) ──────────────────────────────── */
  .sk-progress {
    position: fixed;
    top: 0;
    left: 0;
    height: 3px;
    width: 40%;
    background: linear-gradient(90deg, var(--sk-green), var(--sk-green-light));
    z-index: 10001;
    border-radius: 0 2px 2px 0;
    /* Animação suave de progresso */
    animation: sk-progress-grow 2s ease-in-out forwards;
  }
  @keyframes sk-progress-grow {
    0%   { width: 25%; }
    60%  { width: 72%; }
    100% { width: 72%; }
  }

  /* ─── Nav / Cabeçalho ────────────────────────────────────────── */
  .sk-nav {
    background: rgba(255,255,255,0.98);
    border-bottom: 1px solid var(--sk-border);
    padding: 14px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    min-height: 56px;
    flex-shrink: 0;
    /* Espaço para o progress bar */
    padding-top: calc(14px + 3px);
  }
  .sk-nav-logo {
    height: 28px;
    width: 110px;
    border-radius: 6px;
  }
  .sk-nav-badge {
    height: 22px;
    width: 80px;
    border-radius: 99px;
  }

  /* ─── Container de conteúdo ──────────────────────────────────── */
  .sk-container {
    display: flex;
    flex-direction: column;
    padding: 20px 16px;
    gap: 16px;
    max-width: 500px;
    width: 100%;
    margin: 0 auto;
    /* Espaço para o footer fixo */
    padding-bottom: calc(160px + env(safe-area-inset-bottom, 20px));
  }

  /* ─── Cartão do Produto ──────────────────────────────────────── */
  .sk-product-card {
    background: var(--sk-card);
    border-radius: var(--sk-radius-lg);
    border: 1px solid var(--sk-border);
    padding: 16px;
    display: flex;
    gap: 14px;
    position: relative;
    overflow: hidden;
  }
  /* Badge fantasma "OFERTA TIKTOK" */
  .sk-product-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 96px;
    height: 22px;
    background: linear-gradient(
      90deg,
      var(--sk-base)  25%,
      var(--sk-shine) 50%,
      var(--sk-base)  75%
    );
    background-size: 400% 100%;
    animation: sk-shimmer var(--sk-anim-dur) ease-in-out infinite;
    will-change: background-position;
    transform: translateZ(0);
    border-bottom-right-radius: var(--sk-radius-sm);
  }
  .sk-product-img {
    width: 88px;
    height: 88px;
    flex-shrink: 0;
    border-radius: var(--sk-radius-md);
    margin-top: 10px;
  }
  .sk-product-info {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 10px;
  }
  .sk-product-title-1 { height: 14px; width: 100%; }
  .sk-product-title-2 { height: 14px; width: 75%; }
  .sk-product-old-price { height: 12px; width: 80px; border-radius: 4px; }
  .sk-product-new-price { height: 26px; width: 120px; border-radius: 6px; }
  .sk-product-tags {
    display: flex;
    gap: 6px;
    margin-top: 2px;
  }
  .sk-tag { height: 20px; width: 90px; border-radius: 99px; }
  .sk-tag-sm { width: 76px; }

  /* ─── Seletor de Quantidade ──────────────────────────────────── */
  .sk-qty-card {
    background: var(--sk-card);
    border-radius: var(--sk-radius-lg);
    border: 1px solid var(--sk-border);
    padding: 16px 20px;
  }
  .sk-section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .sk-section-icon {
    width: 26px;
    height: 26px;
    border-radius: 50%;
  }
  .sk-section-title {
    height: 13px;
    width: 130px;
    border-radius: 4px;
  }
  .sk-qty-row {
    display: flex;
    gap: 10px;
  }
  /* 3 opções de quantidade */
  .sk-qty-btn {
    flex: 1;
    height: 54px;
    border-radius: var(--sk-radius-md);
  }

  /* ─── Bloco de Formulário (Dados / Endereço) ─────────────────── */
  .sk-form-card {
    background: var(--sk-card);
    border-radius: var(--sk-radius-lg);
    border: 1px solid var(--sk-border);
    overflow: hidden;
  }
  .sk-form-head {
    background: #f8fafc;
    padding: 12px 20px;
    border-bottom: 1px solid var(--sk-border);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .sk-form-body {
    padding: 18px 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  /* Label fantasma acima do input */
  .sk-label { height: 11px; width: 90px; border-radius: 4px; margin-bottom: 6px; }
  .sk-input-field {
    height: 48px;
    width: 100%;
    border-radius: var(--sk-radius-md);
  }
  /* Linha com 2 inputs (ex: Num + Complemento) */
  .sk-input-row {
    display: flex;
    gap: 10px;
  }
  .sk-input-half { flex: 1; }

  /* ─── Resumo do Pedido ───────────────────────────────────────── */
  .sk-summary-card {
    background: var(--sk-card);
    border-radius: var(--sk-radius-lg);
    border: 1px solid var(--sk-border);
    padding: 18px 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .sk-summary-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .sk-summary-label { height: 13px; width: 110px; border-radius: 4px; }
  .sk-summary-value { height: 13px; width: 70px; border-radius: 4px; }
  .sk-summary-divider {
    height: 1px;
    background: var(--sk-border);
    border-radius: 99px;
    animation: none; /* divisor estático — não precisa de shimmer */
  }
  .sk-summary-total-label { height: 15px; width: 90px; border-radius: 4px; }
  .sk-summary-total-value { height: 22px; width: 100px; border-radius: 6px; }

  /* ─── Footer Fixo (Botão de Compra Fantasma) ─────────────────── */
  .sk-footer {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    z-index: 10000;
    padding: 12px 16px;
    padding-bottom: calc(12px + env(safe-area-inset-bottom, 20px));
    background: linear-gradient(
      to top,
      rgba(248,250,252,1) 75%,
      rgba(248,250,252,0)
    );
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .sk-btn-buy {
    height: 54px;
    width: 100%;
    max-width: 500px;
    border-radius: var(--sk-radius-md);
    /* Shimmer levemente mais brilhante no botão para chamar atenção */
    background: linear-gradient(
      90deg,
      #bbf7d0 25%,
      #d1fae5 50%,
      #bbf7d0 75%
    );
    background-size: 400% 100%;
    animation: sk-shimmer var(--sk-anim-dur) ease-in-out infinite;
    will-change: background-position;
    transform: translateZ(0);
    -webkit-transform: translateZ(0);
    border-radius: var(--sk-radius-md);
  }
  .sk-footer-trust {
    height: 11px;
    width: 180px;
    border-radius: 4px;
  }

  /* ─── Texto "Carregando..." ───────────────────────────────────── */
  .sk-loading-text {
    text-align: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 12px;
    color: #94a3b8;
    font-weight: 500;
    /* pulso sutil no texto */
    animation: sk-pulse 1.5s ease-in-out infinite;
  }
  @keyframes sk-pulse {
    0%, 100% { opacity: 0.6; }
    50%       { opacity: 1;   }
  }
</style>
